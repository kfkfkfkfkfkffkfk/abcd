<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video Call</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --accent: #007aff;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            margin: 0;
            overflow: hidden; /* Prevent scrolling for the fullscreen feel */
            height: 100vh;
        }

        /* Fullscreen Remote Video Container */
        #remote-videos-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(50%, 1fr));
            background: #222;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #333;
        }

        /* FaceTime Style Local Preview (Draggable) */
        #local-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 180px;
            aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
            cursor: move;
            border: 2px solid white;
            background: #000;
        }
        #local-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Controls Overlay */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        input { border: 1px solid #ccc; padding: 8px 15px; border-radius: 20px; outline: none; }
        button { 
            background: var(--accent); color: white; border: none; 
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: 600;
            transition: 0.2s;
        }
        button:hover { opacity: 0.8; }
        button.secondary { background: #555; }

        #status {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.5);
            color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="status">ID: <span id="my-id">...</span> | Status: Ready</div>

    <div id="remote-videos-container">
        </div>

    <div id="local-container" onmousedown="dragElement(this)">
        <video id="local-video" autoplay muted playsinline></video>
    </div>

    <div class="controls">
        <input type="text" id="remote-id" placeholder="Friend's ID">
        <button onclick="connectToFriend()">Call</button>
        <button class="secondary" onclick="toggleScreenShare()" id="share-btn">Share Screen</button>
    </div>

    <script>
        const peer = new Peer();
        let localStream;
        let screenStream;
        const peers = {}; // Keep track of all connections

        const localVideo = document.getElementById('local-video');
        const remoteContainer = document.getElementById('remote-videos-container');

        // 1. Initialize Camera
        async function initCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
            } catch (err) {
                console.error("Camera access denied", err);
            }
        }
        initCamera();

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // 2. Answer Calls
        peer.on('call', call => {
            call.answer(localStream);
            setupVideoFeed(call);
        });

        // 3. Make Call
        function connectToFriend() {
            const friendId = document.getElementById('remote-id').value;
            if (!friendId) return alert("Enter ID");
            const call = peer.call(friendId, localStream);
            setupVideoFeed(call);
        }

        // 4. Handle incoming and outgoing streams
        function setupVideoFeed(call) {
            const video = document.createElement('video');
            video.autoplay = true;
            video.playsInline = true;

            call.on('stream', remoteStream => {
                video.srcObject = remoteStream;
                if (!peers[call.peer]) {
                    remoteContainer.appendChild(video);
                    peers[call.peer] = call;
                }
            });

            call.on('close', () => {
                video.remove();
                delete peers[call.peer];
            });
        }

        // 5. Screen Share Logic
        async function toggleScreenShare() {
            if (!screenStream) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const videoTrack = screenStream.getVideoTracks()[0];

                    // Replace track for all active calls
                    for (let peerId in peers) {
                        const sender = peers[peerId].peerConnection.getSenders().find(s => s.track.kind === 'video');
                        sender.replaceTrack(videoTrack);
                    }
                    
                    localVideo.srcObject = screenStream;
                    document.getElementById('share-btn').innerText = "Stop Sharing";

                    videoTrack.onended = () => toggleScreenShare(); // Handle manual "Stop Sharing" from browser
                } catch (e) { console.error(e); }
            } else {
                // Switch back to camera
                const videoTrack = localStream.getVideoTracks()[0];
                for (let peerId in peers) {
                    const sender = peers[peerId].peerConnection.getSenders().find(s => s.track.kind === 'video');
                    sender.replaceTrack(videoTrack);
                }
                localVideo.srcObject = localStream;
                screenStream.getTracks().forEach(t => t.stop());
                screenStream = null;
                document.getElementById('share-btn').innerText = "Share Screen";
            }
        }

        // 6. Draggable UI Logic
        function dragElement(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }
    </script>
</body>
</html>
