<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video & Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --sidebar: #f2f2f7;
            --accent: #007aff;
            --text: #1c1c1e;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
        }

        /* --- Fixed Video Layout --- */
        #main-stage {
            flex-grow: 1;
            position: relative;
            background: #111;
            display: flex; /* Changed to flex for better centering */
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px;
        }

        /* Styles for the remote video windows */
        .remote-video { 
            max-width: 100%; 
            max-height: 100%; 
            border-radius: 12px;
            background: #222;
            flex: 1 1 45%; /* Allows two videos side-by-side */
        }

        /* FaceTime Draggable Mini Video */
        #local-container {
            position: absolute;
            top: 20px; right: 20px;
            width: 150px; aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 100;
            cursor: move;
            background: #000;
            border: 2px solid rgba(255,255,255,0.2);
        }
        #local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* --- Chat Sidebar --- */
        #chat-sidebar {
            width: 300px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #d1d1d6;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 0.9rem;
            word-wrap: break-word;
        }
        .msg.me { background: var(--accent); color: white; align-self: flex-end; }
        .msg.them { background: #e5e5ea; color: black; align-self: flex-start; }

        .chat-input-area {
            padding: 15px;
            background: var(--bg);
            display: flex;
            gap: 8px;
            border-top: 1px solid #d1d1d6;
        }

        input[type="text"] {
            flex-grow: 1;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 8px 15px;
            outline: none;
        }

        /* --- Controls --- */
        .toolbar {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button {
            border: none; background: var(--accent); color: white;
            padding: 8px 16px; border-radius: 18px;
            font-weight: 600; cursor: pointer; font-size: 0.85rem;
        }
        button.alt { background: #444; }
        button.stop { background: #ff3b30; }

        #status-bar {
            position: absolute; top: 10px; left: 10px;
            font-size: 0.7rem; color: #aaa; z-index: 10;
        }
    </style>
</head>
<body>

<div id="status-bar">ID: <span id="my-id">...</span></div>

<div id="main-stage">
    </div>

<div id="local-container">
    <video id="local-video" autoplay muted playsinline></video>
</div>

<div class="toolbar">
    <input type="text" id="friend-id-input" placeholder="Enter ID">
    <button onclick="startCall()">Connect</button>
    <button id="screen-btn" class="alt" onclick="toggleScreen()">Share Screen</button>
</div>

<div id="chat-sidebar">
    <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd;">Group Chat</div>
    <div id="messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-msg" placeholder="Type a message...">
        <button onclick="sendChatMessage()">Send</button>
    </div>
</div>

<script>
    const peer = new Peer();
    let myStream;
    let myScreen;
    const connections = {}; 

    const mainStage = document.getElementById('main-stage');
    const localVideo = document.getElementById('local-video');
    const msgInput = document.getElementById('chat-msg');
    const msgContainer = document.getElementById('messages');
    const screenBtn = document.getElementById('screen-btn');

    // 1. Get Camera
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
        myStream = stream;
        localVideo.srcObject = stream;
    });

    peer.on('open', id => document.getElementById('my-id').innerText = id);

    // 2. Incoming Logic
    peer.on('call', call => {
        call.answer(myStream);
        handleVideo(call);
    });

    peer.on('connection', conn => {
        setupChat(conn);
    });

    // 3. Initiate Connection
    function startCall() {
        const targetId = document.getElementById('friend-id-input').value;
        if (!targetId) return;

        const call = peer.call(targetId, myStream);
        handleVideo(call);

        const conn = peer.connect(targetId);
        setupChat(conn);
    }

    // 4. Fixed Video Management
    function handleVideo(call) {
        call.on('stream', remoteStream => {
            // Check if we already have a video element for this peer
            let v = document.getElementById(`video-${call.peer}`);
            if (!v) {
                v = document.createElement('video');
                v.id = `video-${call.peer}`;
                v.className = 'remote-video';
                v.autoplay = true; 
                v.playsInline = true;
                mainStage.appendChild(v);
            }
            v.srcObject = remoteStream;
            
            if (!connections[call.peer]) connections[call.peer] = {};
            connections[call.peer].call = call;
        });

        call.on('close', () => {
            const v = document.getElementById(`video-${call.peer}`);
            if (v) v.remove();
        });
    }

    // 5. Chat Management
    function setupChat(conn) {
        if (!connections[conn.peer]) connections[conn.peer] = {};
        connections[conn.peer].data = conn;

        conn.on('data', data => appendMessage(data, 'them'));
    }

    function sendChatMessage() {
        const text = msgInput.value;
        if (!text) return;

        Object.values(connections).forEach(c => {
            if (c.data) c.data.send(text);
        });

        appendMessage(text, 'me');
        msgInput.value = "";
    }

    function appendMessage(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // 6. Improved Screen Share / Unshare Logic
    async function toggleScreen() {
        if (!myScreen) {
            try {
                myScreen = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const track = myScreen.getVideoTracks()[0];
                
                // Change UI
                localVideo.srcObject = myScreen;
                screenBtn.innerText = "Stop Sharing";
                screenBtn.classList.add('stop');

                updateTracks(track);

                // Handle user clicking "Stop Sharing" on the browser's native popup
                track.onended = () => stopSharing();
            } catch (err) {
                console.error("Error sharing screen:", err);
            }
        } else {
            stopSharing();
        }
    }

    function stopSharing() {
        if (myScreen) {
            myScreen.getTracks().forEach(t => t.stop());
            myScreen = null;
        }
        
        const videoTrack = myStream.getVideoTracks()[0];
        localVideo.srcObject = myStream;
        updateTracks(videoTrack);

        // Reset UI
        screenBtn.innerText = "Share Screen";
        screenBtn.classList.remove('stop');
    }

    function updateTracks(newTrack) {
        Object.values(connections).forEach(c => {
            if (c.call && c.call.peerConnection) {
                const sender = c.call.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(newTrack);
            }
        });
    }

    // 7. Draggable Logic
    const dragItem = document.getElementById("local-container");
    let active = false;
    let currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

    document.addEventListener("mousedown", dragStart);
    document.addEventListener("mouseup", dragEnd);
    document.addEventListener("mousemove", drag);

    function dragStart(e) {
        if (e.target === dragItem || dragItem.contains(e.target)) {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            active = true;
        }
    }
    function dragEnd() { active = false; }
    function drag(e) {
        if (active) {
            e.preventDefault();
            currentX = e.clientX - initialX;
            currentY = e.clientY - initialY;
            xOffset = currentX;
            yOffset = currentY;
            dragItem.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
        }
    }

    msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendChatMessage(); });
</script>

</body>
</html>
