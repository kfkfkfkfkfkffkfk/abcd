<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video & Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --sidebar: #f2f2f7;
            --accent: #007aff;
            --text: #1c1c1e;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
        }

        /* --- Video Layout --- */
        #main-stage {
            flex-grow: 1;
            position: relative;
            background: #111;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(50%, 1fr));
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* FaceTime Draggable Mini Video */
        #local-container {
            position: absolute;
            top: 20px; right: 20px;
            width: 150px; aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 100;
            cursor: move;
            background: #000;
            border: 2px solid rgba(255,255,255,0.2);
        }
        #local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* --- Chat Sidebar --- */
        #chat-sidebar {
            width: 300px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #d1d1d6;
            transition: 0.3s;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 0.9rem;
            word-wrap: break-word;
        }
        .msg.me { background: var(--accent); color: white; align-self: flex-end; }
        .msg.them { background: #e5e5ea; color: black; align-self: flex-start; }

        .chat-input-area {
            padding: 15px;
            background: var(--bg);
            display: flex;
            gap: 8px;
            border-top: 1px solid #d1d1d6;
        }

        input[type="text"] {
            flex-grow: 1;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 8px 15px;
            outline: none;
        }

        /* --- Controls --- */
        .toolbar {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button {
            border: none; background: var(--accent); color: white;
            padding: 8px 16px; border-radius: 18px;
            font-weight: 600; cursor: pointer; font-size: 0.85rem;
        }
        button.alt { background: #444; }

        #status-bar {
            position: absolute; top: 10px; left: 10px;
            font-size: 0.7rem; color: #aaa; z-index: 10;
        }
    </style>
</head>
<body>

<div id="status-bar">ID: <span id="my-id">...</span></div>

<div id="main-stage">
    </div>

<div id="local-container" onmousedown="dragElement(this)">
    <video id="local-video" autoplay muted playsinline></video>
</div>

<div class="toolbar">
    <input type="text" id="friend-id-input" placeholder="Enter ID">
    <button onclick="startCall()">Connect</button>
    <button class="alt" onclick="toggleScreen()">Screen Share</button>
</div>

<div id="chat-sidebar">
    <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd;">Group Chat</div>
    <div id="messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-msg" placeholder="Type a message...">
        <button onclick="sendChatMessage()">Send</button>
    </div>
</div>

<script>
    const peer = new Peer();
    let myStream;
    let myScreen;
    const connections = {}; // Stores both Media (calls) and Data (chat)

    const mainStage = document.getElementById('main-stage');
    const localVideo = document.getElementById('local-video');
    const msgInput = document.getElementById('chat-msg');
    const msgContainer = document.getElementById('messages');

    // 1. Get Camera
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
        myStream = stream;
        localVideo.srcObject = stream;
    });

    peer.on('open', id => document.getElementById('my-id').innerText = id);

    // 2. Incoming Logic (Calls and Data)
    peer.on('call', call => {
        call.answer(myStream);
        handleVideo(call);
    });

    peer.on('connection', conn => {
        setupChat(conn);
    });

    // 3. Initiate Connection
    function startCall() {
        const targetId = document.getElementById('friend-id-input').value;
        if (!targetId) return;

        // Start Video Call
        const call = peer.call(targetId, myStream);
        handleVideo(call);

        // Start Chat Connection
        const conn = peer.connect(targetId);
        setupChat(conn);
    }

    // 4. Video Management
    function handleVideo(call) {
        const v = document.createElement('video');
        v.autoplay = true; v.playsInline = true;
        call.on('stream', remoteStream => {
            v.srcObject = remoteStream;
            if (!connections[call.peer]) {
                mainStage.appendChild(v);
                connections[call.peer] = { call };
            }
        });
        call.on('close', () => v.remove());
    }

    // 5. Chat Management
    function setupChat(conn) {
        if (!connections[conn.peer]) connections[conn.peer] = {};
        connections[conn.peer].data = conn;

        conn.on('data', data => {
            appendMessage(data, 'them');
        });
    }

    function sendChatMessage() {
        const text = msgInput.value;
        if (!text) return;

        // Send to all connected peers
        Object.values(connections).forEach(c => {
            if (c.data) c.data.send(text);
        });

        appendMessage(text, 'me');
        msgInput.value = "";
    }

    function appendMessage(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // 6. Screen Share
    async function toggleScreen() {
        if (!myScreen) {
            myScreen = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const track = myScreen.getVideoTracks()[0];
            localVideo.srcObject = myScreen;
            updateTracks(track);
            track.onended = () => toggleScreen();
        } else {
            const track = myStream.getVideoTracks()[0];
            localVideo.srcObject = myStream;
            updateTracks(track);
            myScreen.getTracks().forEach(t => t.stop());
            myScreen = null;
        }
    }

    function updateTracks(newTrack) {
        Object.values(connections).forEach(c => {
            if (c.call) {
                const sender = c.call.peerConnection.getSenders().find(s => s.track.kind === 'video');
                sender.replaceTrack(newTrack);
            }
        });
    }

    // 7. Draggable Logic
    function dragElement(e) {
        let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
        e.onmousedown = (event) => {
            p3 = event.clientX; p4 = event.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (ev) => {
                p1 = p3 - ev.clientX; p2 = p4 - ev.clientY;
                p3 = ev.clientX; p4 = ev.clientY;
                e.style.top = (e.offsetTop - p2) + "px"; e.style.left = (e.offsetLeft - p1) + "px";
            };
        };
    }

    // Listen for Enter Key in Chat
    msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendChatMessage(); });
</script>

</body>
</html>
