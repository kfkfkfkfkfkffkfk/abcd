<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video & Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --sidebar: #f2f2f7;
            --accent: #007aff;
            --text: #1c1c1e;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
        }

        /* --- Video Layout --- */
        #main-stage {
            flex-grow: 1;
            position: relative;
            background: #111;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px;
            overflow: hidden; /* Keeps things tidy */
        }

        .remote-video { 
            max-width: 100%; 
            max-height: 100%; 
            border-radius: 12px;
            background: #222;
            flex: 1 1 45%; 
        }

        /* Local Video (Self) */
        #local-container {
            position: absolute;
            top: 20px; left: 20px; /* Default start */
            width: 150px; aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 100;
            cursor: move;
            background: #000;
            border: 2px solid rgba(255,255,255,0.2);
            touch-action: none; /* Prevents scrolling while dragging */
        }
        #local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* --- Chat Sidebar Fixes --- */
        #chat-sidebar {
            width: 320px; /* Slightly wider for buttons */
            min-width: 320px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #d1d1d6;
            box-sizing: border-box; /* Ensures padding doesn't push it off screen */
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Message Bubble Styling */
        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.them { align-self: flex-start; align-items: flex-start; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.9rem;
            position: relative;
            word-wrap: break-word;
            width: fit-content;
        }
        .me .msg-bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .them .msg-bubble { background: #e5e5ea; color: black; border-bottom-left-radius: 4px; }

        .msg-meta {
            font-size: 0.65rem;
            color: #8e8e93;
            margin-top: 4px;
            display: flex;
            gap: 8px;
        }

        /* Reaction & Copy Buttons */
        .msg-actions {
            margin-top: 5px;
            display: flex;
            gap: 5px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .msg-wrapper:hover .msg-actions { opacity: 1; }
        .action-btn {
            background: none; border: none; cursor: pointer; padding: 2px;
            font-size: 0.8rem; border-radius: 4px; color: #666;
        }
        .action-btn:hover { background: rgba(0,0,0,0.05); }

        .reaction-badge {
            font-size: 0.8rem;
            background: white;
            border-radius: 10px;
            padding: 2px 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: -8px;
            z-index: 2;
        }

        .chat-input-area {
            padding: 15px;
            background: var(--bg);
            display: flex;
            gap: 8px;
            border-top: 1px solid #d1d1d6;
        }

        /* --- Toolbar --- */
        .toolbar {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        button {
            border: none; background: var(--accent); color: white;
            padding: 8px 16px; border-radius: 18px;
            font-weight: 600; cursor: pointer; font-size: 0.8rem;
        }
        button.alt { background: #444; }
        button.stop { background: #ff3b30; }

        #status-bar {
            position: absolute; top: 10px; left: 10px;
            font-size: 0.7rem; color: #aaa; z-index: 10;
        }
    </style>
</head>
<body>

<div id="status-bar">ID: <span id="my-id">...</span></div>

<div id="main-stage"></div>

<div id="local-container">
    <video id="local-video" autoplay muted playsinline></video>
</div>

<div class="toolbar">
    <input type="text" id="friend-id-input" placeholder="Enter ID" style="border:1px solid #ccc; border-radius:15px; padding: 0 10px;">
    <button onclick="startCall()">Connect</button>
    <button id="screen-btn" class="alt" onclick="toggleScreen()">Share Screen</button>
</div>

<div id="chat-sidebar">
    <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd;">Chat</div>
    <div id="messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-msg" placeholder="Type a message...">
        <button onclick="sendChatMessage()">Send</button>
    </div>
</div>

<script>
    const peer = new Peer();
    let myStream, myScreen;
    const connections = {}; 

    const mainStage = document.getElementById('main-stage');
    const localVideo = document.getElementById('local-video');
    const msgInput = document.getElementById('chat-msg');
    const msgContainer = document.getElementById('messages');
    const screenBtn = document.getElementById('screen-btn');

    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
        myStream = stream;
        localVideo.srcObject = stream;
    });

    peer.on('open', id => document.getElementById('my-id').innerText = id);

    peer.on('call', call => {
        call.answer(myStream);
        handleVideo(call);
    });

    peer.on('connection', conn => {
        setupChat(conn);
    });

    function startCall() {
        const targetId = document.getElementById('friend-id-input').value;
        if (!targetId) return;
        handleVideo(peer.call(targetId, myStream));
        setupChat(peer.connect(targetId));
    }

    function handleVideo(call) {
        call.on('stream', remoteStream => {
            let v = document.getElementById(`video-${call.peer}`);
            if (!v) {
                v = document.createElement('video');
                v.id = `video-${call.peer}`;
                v.className = 'remote-video';
                v.autoplay = true; v.playsInline = true;
                mainStage.appendChild(v);
            }
            v.srcObject = remoteStream;
            if (!connections[call.peer]) connections[call.peer] = {};
            connections[call.peer].call = call;
        });
        call.on('close', () => document.getElementById(`video-${call.peer}`)?.remove());
    }

    function setupChat(conn) {
        if (!connections[conn.peer]) connections[conn.peer] = {};
        connections[conn.peer].data = conn;
        conn.on('data', data => {
            if(data.type === 'chat') appendMessage(data.text, 'them');
            if(data.type === 'reaction') handleIncomingReaction(data);
        });
    }

    function sendChatMessage() {
        const text = msgInput.value;
        if (!text) return;
        const msgData = { type: 'chat', text: text };
        Object.values(connections).forEach(c => c.data?.send(msgData));
        appendMessage(text, 'me');
        msgInput.value = "";
    }

    function appendMessage(text, side) {
        const id = 'msg-' + Date.now();
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${side}`;
        wrapper.id = id;

        wrapper.innerHTML = `
            <div class="msg-bubble">${text}</div>
            <div class="msg-reaction-container" id="react-${id}"></div>
            <div class="msg-meta">
                <span>${time}</span>
                <div class="msg-actions">
                    <button class="action-btn" onclick="copyMsg('${text}')">📋 Copy</button>
                    <button class="action-btn" onclick="sendReaction('${id}', '👍')">👍</button>
                    <button class="action-btn" onclick="sendReaction('${id}', '❤️')">❤️</button>
                    <button class="action-btn" onclick="sendReaction('${id}', '😂')">😂</button>
                </div>
            </div>
        `;
        msgContainer.appendChild(wrapper);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function copyMsg(text) {
        navigator.clipboard.writeText(text);
        alert("Message copied!");
    }

    function sendReaction(msgId, emoji) {
        const reactData = { type: 'reaction', msgId: msgId, emoji: emoji };
        Object.values(connections).forEach(c => c.data?.send(reactData));
        showReaction(msgId, emoji);
    }

    function handleIncomingReaction(data) {
        showReaction(data.msgId, data.emoji);
    }

    function showReaction(msgId, emoji) {
        const container = document.getElementById(`react-${msgId}`);
        if(container) {
            container.innerHTML = `<span class="reaction-badge">${emoji}</span>`;
        }
    }

    async function toggleScreen() {
        if (!myScreen) {
            myScreen = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const track = myScreen.getVideoTracks()[0];
            localVideo.srcObject = myScreen;
            screenBtn.innerText = "Stop Sharing";
            screenBtn.classList.add('stop');
            updateTracks(track);
            track.onended = () => stopSharing();
        } else { stopSharing(); }
    }

    function stopSharing() {
        if (myScreen) { myScreen.getTracks().forEach(t => t.stop()); myScreen = null; }
        localVideo.srcObject = myStream;
        updateTracks(myStream.getVideoTracks()[0]);
        screenBtn.innerText = "Share Screen";
        screenBtn.classList.remove('stop');
    }

    function updateTracks(newTrack) {
        Object.values(connections).forEach(c => {
            const sender = c.call?.peerConnection.getSenders().find(s => s.track.kind === 'video');
            if (sender) sender.replaceTrack(newTrack);
        });
    }

    // --- Boundaries Logic for Dragging ---
    const dragItem = document.getElementById("local-container");
    let active = false, currentX = 0, currentY = 0, initialX, initialY, xOffset = 0, yOffset = 0;

    document.addEventListener("mousedown", dragStart);
    document.addEventListener("mouseup", dragEnd);
    document.addEventListener("mousemove", drag);

    function dragStart(e) {
        if (e.target === dragItem || dragItem.contains(e.target)) {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            active = true;
        }
    }

    function dragEnd() { active = false; }

    function drag(e) {
        if (active) {
            e.preventDefault();
            let newX = e.clientX - initialX;
            let newY = e.clientY - initialY;

            // Define boundaries
            const bounds = mainStage.getBoundingClientRect();
            const box = dragItem.getBoundingClientRect();

            // Check Left/Right
            if (newX < 0) newX = 0;
            if (newX + box.width > bounds.width) newX = bounds.width - box.width;

            // Check Top/Bottom
            if (newY < 0) newY = 0;
            if (newY + box.height > bounds.height) newY = bounds.height - box.height;

            xOffset = newX;
            yOffset = newY;
            dragItem.style.transform = `translate3d(${newX}px, ${newY}px, 0)`;
        }
    }

    msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendChatMessage(); });
</script>
</body>
</html>
